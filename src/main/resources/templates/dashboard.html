<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      color: white;
    }

    /* Header */
    .header {
      padding: 20px;
      font-size: 26px;
      font-weight: 600;
      text-align: center;
      animation: fadeDown 1s ease;
    }

    /* Container */
    .container {
      padding: 20px;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: 0.3s;
      animation: fadeUp 1s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    .card h3 {
      font-size: 16px;
      opacity: 0.8;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    /* Buttons */
    .actions {
      margin-top: 30px;
      text-align: center;
    }

    .btn {
      background: white;
      color: #764ba2;
      padding: 12px 25px;
      border-radius: 30px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff7eb3;
      color: white;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeDown {
      from {
        transform: translateY(-40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="header">✨ Retail Dashboard ✨</div>

  <div class="container">
    <div class="cards">

      <div class="card">
        <h3>💰 Doanh thu hôm nay</h3>
        <p>$1,250</p>
      </div>

      <div class="card">
        <h3>📦 Đơn hàng</h3>
        <p>32</p>
      </div>

      <div class="card">
        <h3>🛍️ Sản phẩm</h3>
        <p>120</p>
      </div>

      <div class="card">
        <h3>👥 Khách hàng</h3>
        <p>89</p>
      </div>

    </div>

    <div class="actions">
      <button class="btn" onclick="alert('Chức năng đang phát triển 🚀')">
        + Thêm đơn hàng
      </button>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Dashboard</title>
	
		<!-- Tailwind -->
		<script src="https://cdn.tailwindcss.com"></script>
	
		<!-- FIX ICON -->
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
	
	</head>

<body class="bg-slate-100 font-manrope">

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- CONTENT -->
<main class="ml-0 lg:ml-64 mt-16 pb-20 p-6 min-h-screen">

    <!-- TITLE -->
    <h1 class="text-2xl font-bold text-slate-700">Dashboard</h1>

    <!-- CARD -->
    <div class="mt-6 bg-white p-6 rounded-2xl shadow hover:shadow-md transition">

        <p class="text-slate-400 text-sm">Tổng sản phẩm</p>

        <h2 class="text-3xl font-bold text-rose-400 mt-2"
            th:text="${totalProducts}">
        </h2>

    </div>

</main>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

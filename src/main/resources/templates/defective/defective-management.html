<!DOCTYPE html>
<html class="light" lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Quản lý Hàng lỗi & Hết hạn</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-slate-100 font-manrope">

<!-- ✅ HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- ✅ SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- ✅ CONTENT -->
<main class="ml-0 lg:ml-64 mt-16 pb-20 p-6 min-h-screen space-y-6">

    <!-- HEADER TITLE -->
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold">Quản lý Hàng lỗi & Hết hạn</h1>
            <p class="text-slate-500 mt-1">Theo dõi, kiểm soát chất lượng và xử lý hàng hóa không đạt tiêu chuẩn.</p>
        </div>

        <div class="flex items-center gap-3">
            <form th:action="@{/defective/expire-all}" method="post">
                <button type="submit"
                        class="flex items-center gap-2 px-5 py-2.5 border border-slate-300 text-slate-700 font-semibold rounded-lg hover:bg-slate-100">
                    <span class="material-symbols-outlined">delete_sweep</span>
                    Xử lý hết hạn
                </button>
            </form>

            <a th:href="@{/defective/handle}"
               class="flex items-center gap-2 px-6 py-2.5 bg-[#cd8484] text-white font-bold rounded-lg hover:bg-[#b87171] shadow">
                <span class="material-symbols-outlined">report_problem</span>
                Báo hàng lỗi
            </a>
        </div>
    </div>

    <!-- ALERT -->
    <div th:if="${successMessage}" class="bg-green-100 text-green-700 px-4 py-3 rounded-lg" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="bg-red-100 text-red-700 px-4 py-3 rounded-lg" th:text="${errorMessage}"></div>

    <!-- STATS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-white p-5 rounded-xl shadow">
            <p class="text-sm text-slate-500">Tổng lô</p>
            <p class="text-2xl font-bold mt-2" th:text="${totalBatches}">0</p>
        </div>

        <div class="bg-white p-5 rounded-xl shadow">
            <p class="text-sm text-slate-500">Sắp hết hạn</p>
            <p class="text-2xl font-bold mt-2 text-amber-600" th:text="${expiringSoonBatches}">0</p>
        </div>

        <div class="bg-white p-5 rounded-xl shadow">
            <p class="text-sm text-slate-500">Đã hết hạn</p>
            <p class="text-2xl font-bold mt-2 text-red-600" th:text="${expiredBatches}">0</p>
        </div>

        <div class="bg-white p-5 rounded-xl shadow">
            <p class="text-sm text-slate-500">Tổng lỗi</p>
            <p class="text-2xl font-bold mt-2" th:text="${totalDefectiveQuantity}">0</p>
        </div>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow overflow-hidden">

        <!-- FILTER -->
        <form th:action="@{/defective}" method="get"
              class="p-6 border-b grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 bg-slate-50">

            <input type="date" name="fromDate" th:value="${fromDate}" class="text-sm rounded-lg border"/>
            <input type="date" name="toDate" th:value="${toDate}" class="text-sm rounded-lg border"/>

            <select name="expiryStatus" class="text-sm rounded-lg border">
                <option value="ALL">Tất cả</option>
                <option value="VALID">Còn hạn</option>
                <option value="EXPIRING">Sắp hết hạn</option>
                <option value="EXPIRED">Đã hết hạn</option>
            </select>

            <select name="reason" class="text-sm rounded-lg border">
                <option value="ALL">Lý do</option>
                <option th:each="r : ${reasonOptions}" th:value="${r}" th:text="${r}"></option>
            </select>

            <div class="flex gap-2">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Batch / SP"
                       class="w-full text-sm rounded-lg border"/>
                <button class="px-4 bg-slate-800 text-white rounded-lg">Lọc</button>
            </div>
        </form>

        <!-- TABLE -->
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                <tr>
                    <th class="px-4 py-3 text-xs">Batch</th>
                    <th class="px-4 py-3 text-xs">Sản phẩm</th>
                    <th class="px-4 py-3 text-xs">SL OK</th>
                    <th class="px-4 py-3 text-xs">SL lỗi</th>
                    <th class="px-4 py-3 text-xs">HSD</th>
                    <th class="px-4 py-3 text-xs">Trạng thái</th>
                    <th class="px-4 py-3 text-right text-xs">Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(rows)}">
                    <td colspan="7" class="text-center py-6 text-slate-400">Không có dữ liệu</td>
                </tr>

                <tr th:each="r : ${rows}" class="border-b hover:bg-slate-50">
                    <td class="px-4 py-3" th:text="${r['BatchID']}"></td>

                    <td class="px-4 py-3">
                        <div class="font-semibold" th:text="${r['ProductName']}"></div>
                        <div class="text-xs text-slate-400" th:text="${r['ProductID']}"></div>
                    </td>

                    <td class="px-4 py-3 font-bold" th:text="${r['SellableStock']}"></td>
                    <td class="px-4 py-3 text-red-500 font-bold" th:text="${r['DefectiveQuantity']}"></td>

                    <td class="px-4 py-3 text-xs" th:text="${r['ExpiryDateText']}"></td>

                    <td class="px-4 py-3 text-xs">
                        <span th:if="${r['ExpiryStatus']=='EXPIRED'}" class="text-red-500">Hết hạn</span>
                        <span th:if="${r['ExpiryStatus']=='EXPIRING'}" class="text-amber-500">Sắp hết</span>
                        <span th:if="${r['ExpiryStatus']=='VALID'}" class="text-green-500">OK</span>
                    </td>

                    <td class="px-4 py-3 text-right">
                        <a th:href="@{/defective/handle(batchId=${r['BatchID']})}"
                           class="px-3 py-1 border rounded-lg text-xs hover:bg-slate-100">
                            Xử lý
                        </a>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>

    </div>

</main>

<!-- ✅ FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

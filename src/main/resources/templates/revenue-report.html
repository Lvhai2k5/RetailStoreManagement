<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="utf-8"/>
    <title>Báo cáo doanh thu - Merchant Core</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b]">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="flex h-screen pt-16 overflow-hidden">
        
        <aside class="hidden lg:block w-64 h-full flex-shrink-0 border-r border-slate-100 bg-slate-50 overflow-y-auto">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        </aside>

        <main class="flex-1 h-full overflow-y-auto p-8 custom-scrollbar">
            
            <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 mb-10">
                <div>
                    <h1 class="text-2xl font-extrabold font-manrope">Báo cáo doanh thu</h1>
                    <p class="text-slate-400 text-sm">Phân tích hiệu quả kinh doanh cửa hàng</p>
                </div>
                
                <div class="flex flex-col gap-4 w-full xl:w-auto">
					<form th:action="@{/revenue}" method="get" id="revenueForm"
						class="flex flex-wrap items-center gap-3">
						<div
							class="flex items-center bg-white border border-slate-200 rounded-2xl p-1 shadow-sm">
							<button type="button" onclick="updateDateRange('week')"
								th:classappend="${currentRange == 'week' ? 'bg-rose-100 text-rose-600' : 'text-slate-500'}"
								class="px-5 py-2 text-sm font-bold rounded-xl transition-all">Tuần này</button>
							<button type="button" onclick="updateDateRange('month')"
								th:classappend="${currentRange == 'month' ? 'bg-rose-100 text-rose-600' : 'text-slate-500'}"
								class="px-5 py-2 text-sm font-bold rounded-xl transition-all">Tháng này</button>
							<button type="button" onclick="updateDateRange('year')"
								th:classappend="${currentRange == 'year' ? 'bg-rose-100 text-rose-600' : 'text-slate-500'}"
								class="px-5 py-2 text-sm font-bold rounded-xl transition-all text-nowrap">Năm nay</button>
							<button type="button" id="btnCustom"
								th:classappend="${currentRange == 'custom' ? 'bg-rose-100 text-rose-600' : 'text-slate-500'}"
								class="px-5 py-2 text-sm font-bold rounded-xl transition-all">Tùy chọn</button>
						</div>

						<div
							class="flex items-center gap-2 bg-white border border-slate-200 rounded-2xl px-4 py-2 shadow-sm">
							<span
								class="material-symbols-outlined text-slate-400 text-sm font-bold">calendar_month</span>
							<input type="date" id="startDate" name="startDate"
								th:value="${startDate}"
								class="border-none text-xs font-bold focus:ring-0 p-0 w-28 bg-transparent">
							<span class="text-slate-300">-</span> <input type="date"
								id="endDate" name="endDate" th:value="${endDate}"
								class="border-none text-xs font-bold focus:ring-0 p-0 w-28 bg-transparent">
							<input type="hidden" id="rangeInput" name="range"
								th:value="${currentRange}">
							<button type="submit"
								class="text-rose-500 hover:scale-110 transition-transform">
								<span class="material-symbols-outlined font-bold">search</span>
							</button>
						</div>
					</form>

					<div class="flex items-center gap-3">
						<button type="button" onclick="handleExportExcel()"
							class="flex items-center gap-2 px-6 py-2.5 bg-[#45617c] text-white text-sm font-bold rounded-xl shadow-lg shadow-slate-200 hover:bg-[#344b61] transition-all">
							<span class="material-symbols-outlined text-lg">download</span>Xuất Excel
						</button>
					</div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden group">
                    <div class="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 mb-6 group-hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-3xl">payments</span>
                    </div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tổng doanh thu</p>
                    <h3 class="text-3xl font-black font-manrope mt-2" th:text="${#numbers.formatDecimal(report.totalRevenue, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</h3>
                </div>

                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 mb-6">
                        <span class="material-symbols-outlined text-3xl">shopping_bag</span>
                    </div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Số đơn hàng thành công</p>
                    <h3 class="text-3xl font-black font-manrope mt-2" th:text="${report.totalOrders}">0</h3>
                </div>

                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 mb-6">
                        <span class="material-symbols-outlined text-3xl">query_stats</span>
                    </div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Lợi nhuận ước tính</p>
                    <h3 class="text-3xl font-black font-manrope mt-2" th:text="${#numbers.formatDecimal(report.netRevenue.multiply(0.25), 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h4 class="font-bold font-manrope text-slate-700 mb-10">Biến động doanh thu</h4>
                    <div class="h-[300px] w-full"><canvas id="revenueChart"></canvas></div>
                </div>
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h4 class="font-bold font-manrope text-slate-700 mb-10 text-center">Trạng thái đơn hàng</h4>
                    <div class="h-[300px] w-full flex justify-center"><canvas id="orderStatusChart"></canvas></div>
                </div>
            </div>
            </div>
        </main>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script th:inline="javascript">
        // Cấu hình Chart.js An toàn (Responsive: true & AspectRatio: false)
        Chart.defaults.font.family = 'Inter';
        const dailyData = /*[[${report.dailyRevenue}]]*/ [];
        
        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: dailyData.map(d => d.date),
                datasets: [{ 
                    label: 'Doanh thu', 
                    data: dailyData.map(d => d.value), 
                    backgroundColor: '#d68e8e', 
                    borderRadius: 10,
                    barThickness: 30
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false }, 
                    x: { grid: { display: false }, border: { display: false } } 
                }
            }
        });

        const statusData = /*[[${report.statusDistribution}]]*/ {};
        new Chart(document.getElementById('orderStatusChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(statusData),
                datasets: [{ 
                    data: Object.values(statusData), 
                    backgroundColor: ['#45617c', '#d68e8e', '#f1f5f9'],
                    borderWidth: 0,
                    hoverOffset: 15
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                cutout: '80%',
                plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } }
            }
        });
        function updateDateRange(range) {
            const now = new Date();
            let start = new Date();
            let end = new Date();

            if (range === 'week') {
                // Thứ 2 tuần này đến CN tuần này
                const day = now.getDay();
                const diffToMonday = now.getDate() - day + (day === 0 ? -6 : 1);
                start = new Date(now.setDate(diffToMonday));
                end = new Date(start);
                end.setDate(start.getDate() + 6);
            } else if (range === 'month') {
                // Đầu tháng đến cuối tháng
                start = new Date(now.getFullYear(), now.getMonth(), 1);
                end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            } else if (range === 'year') {
                // Đầu năm đến cuối năm
                start = new Date(now.getFullYear(), 0, 1);
                end = new Date(now.getFullYear(), 11, 31);
            }

            // Format sang yyyy-mm-dd
            const formatDate = (date) => date.toISOString().split('T')[0];

            document.getElementById('startDate').value = formatDate(start);
            document.getElementById('endDate').value = formatDate(end);
            document.getElementById('rangeInput').value = range;
            
            // Submit form tự động
            document.getElementById('revenueForm').submit();
        }

        // Lắng nghe thay đổi trên ô input date để chuyển sang "Tùy chọn"
        document.querySelectorAll('input[type="date"]').forEach(input => {
            input.addEventListener('change', () => {
                document.getElementById('rangeInput').value = 'custom';
                // Có thể đổi màu nút Tùy chọn tại đây bằng class
            });
        });
        function handleExportExcel() {
            // 1. Lấy giá trị hiện tại của các input lọc
            const range = document.getElementById('rangeInput').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            // 2. Tạo URL với query parameters khớp với Controller
            const url = `/revenue/export/excel?range=${range}&startDate=${startDate}&endDate=${endDate}`;

            // 3. Chuyển hướng trình duyệt để tải file
            window.location.href = url;
        }
    </script>
</body>
</html>

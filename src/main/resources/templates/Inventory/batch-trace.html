<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="utf-8"/>
    <title>Truy vết Lô hàng - LogiTrack Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7faf9; height: 100vh; overflow: hidden; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-on-background">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="flex h-screen pt-16 overflow-hidden">
        <aside class="hidden lg:block w-64 h-full flex-shrink-0 border-r border-slate-100 bg-slate-50 overflow-y-auto">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        </aside>

        <main class="flex-1 h-full overflow-y-auto p-8 custom-scrollbar">
            
            <div class="mb-8 flex items-center gap-4">
                <a th:href="@{/inventory}" class="p-2 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all text-slate-500 flex items-center">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <div>
                    <h1 class="text-2xl font-extrabold font-manrope">Chi tiết truy vết lô hàng</h1>
                    <p class="text-slate-400 text-sm font-medium mt-1">Lịch sử biến động kho chi tiết</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm h-fit">
                    <div class="w-16 h-16 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mb-6">
                        <span class="material-symbols-outlined text-3xl">inventory_2</span>
                    </div>
                    <h3 class="text-xl font-black font-manrope text-slate-800" th:text="${'Mã lô: BAT-' + traceData.batchID}">BAT-000</h3>
                    <p class="text-sm font-bold text-slate-500 mt-2" th:text="${traceData.productName}">Tên sản phẩm</p>
                    
                    <hr class="my-6 border-slate-100">
                    
                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Nhà cung cấp</p>
                            <p class="text-sm font-bold text-slate-700 mt-1" th:text="${traceData.supplierName}"></p>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Số lượng nhập ban đầu</p>
                            <p class="text-sm font-bold text-emerald-600 mt-1" th:text="${traceData.importQty + ' sản phẩm'}"></p>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Ngày nhập kho</p>
                            <p class="text-sm font-bold text-slate-700 mt-1" th:text="${#temporals.format(traceData.importDate, 'dd/MM/yyyy HH:mm')}"></p>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h3 class="text-lg font-black font-manrope text-slate-800 mb-8">Nhật ký giao dịch</h3>
                    
                    <div class="relative pl-6 border-l-2 border-slate-100 space-y-8">
                        
                        <div th:each="tx : ${traceData.history}" class="relative">
                            <div class="absolute -left-[35px] w-8 h-8 rounded-full border-4 border-white flex items-center justify-center"
                                 th:classappend="${tx.change > 0 ? 'bg-emerald-500' : 'bg-rose-500'}">
                                <span class="material-symbols-outlined text-white text-[14px]"
                                      th:text="${tx.change > 0 ? 'add' : 'remove'}"></span>
                            </div>
                            
                            <div class="bg-slate-50/50 rounded-2xl p-5 border border-slate-100">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <span class="px-2 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest"
                                              th:classappend="${tx.type == 'SELL' ? 'bg-blue-100 text-blue-600' : 
                                                            (tx.type == 'IMPORT' ? 'bg-emerald-100 text-emerald-600' : 
                                                            (tx.type == 'RETURN' ? 'bg-amber-100 text-amber-600' : 'bg-rose-100 text-rose-600'))}"
                                              th:text="${tx.type}">TYPE</span>
                                        <p class="text-[11px] font-bold text-slate-400 mt-2" 
                                           th:text="${#temporals.format(tx.date, 'dd/MM/yyyy - HH:mm:ss')}"></p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-lg font-black"
                                           th:classappend="${tx.change > 0 ? 'text-emerald-600' : 'text-rose-600'}"
                                           th:text="${(tx.change > 0 ? '+' : '') + tx.change}"></p>
                                    </div>
                                </div>
                                <p class="text-xs font-bold text-slate-500 mt-3" th:if="${tx.ref != null}">
                                    Mã tham chiếu (Đơn hàng / Phiếu lỗi): <span class="text-slate-800" th:text="${'#' + tx.ref}"></span>
                                </p>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>

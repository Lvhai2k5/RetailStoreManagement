<header th:fragment="header"
        class="fixed top-0 w-full z-50 h-16
               bg-gradient-to-r from-white/80 via-white/70 to-white/80
               backdrop-blur-xl border-b border-slate-200 shadow-sm font-manrope">

    <div class="flex justify-between items-center px-8 h-full">

        <!-- LEFT -->
        <div class="flex items-center gap-10">

            <!-- LOGO -->
            <div class="flex items-center gap-3">

                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-rose-400 to-pink-500
                            shadow-lg shadow-rose-200 flex items-center justify-center">
                    <span class="text-white font-bold text-sm">RS</span>
                </div>

                <span class="text-xl font-extrabold bg-gradient-to-r from-rose-500 to-pink-500
                             bg-clip-text text-transparent tracking-wide">
                    Retail Store
                </span>

            </div>

            <!-- CLOCK -->
            <div class="flex items-center gap-2 px-4 py-1.5 rounded-full
                        bg-white border border-slate-200 shadow-sm hover:shadow-md transition">

                <span class="material-symbols-outlined text-[18px] text-rose-400">
                    schedule
                </span>

                <span id="clock" class="text-sm font-bold text-slate-600 tracking-wide">
                    00:00:00
                </span>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-5">

            <!-- USER -->
            <div class="relative group cursor-pointer">

                <!-- USER BOX -->
                <div class="flex items-center gap-3 px-3 py-1.5 rounded-full
                            bg-white border border-slate-200 shadow-sm
                            hover:shadow-md transition">

                    <!-- AVATAR SMALL -->
                    <div class="w-9 h-9 rounded-full overflow-hidden border border-rose-100">
                        <img src="/images/avatar.png" alt="Profile">
                    </div>

                    <!-- NAME -->
                    <span class="text-sm font-bold text-slate-600 group-hover:text-rose-500 transition">
                        Admin
                    </span>

                </div>

                <!-- HOVER LARGE AVATAR -->
                <div class="absolute right-0 mt-3 hidden group-hover:block
                            bg-white border border-slate-200 shadow-xl rounded-xl p-3">

                    <img src="/images/avatar.png"
                         class="w-32 h-32 rounded-lg object-cover"
                         alt="Large Profile">
                </div>

            </div>

        </div>

    </div>

    <!-- CLOCK SCRIPT -->
    <script>
        function updateClock() {
            const now = new Date();

            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');

            document.getElementById("clock").innerText = `${h}:${m}:${s}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</header>

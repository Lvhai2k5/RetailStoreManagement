<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách đơn hàng</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body class="bg-slate-100 font-sans">

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- CONTENT -->
<div class="ml-0 lg:ml-64 mt-20 p-6">

    <h1 class="text-2xl font-bold mb-6 text-slate-700">
        📦 Danh sách đơn hàng
    </h1>

    <!-- SEARCH -->
    <input type="text" id="searchOrder"
           placeholder="🔍 Nhập mã đơn hàng..."
           class="mb-6 px-4 py-2 border rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400">

    <!-- LIST -->
    <div id="orderContainer">

        <!-- LOOP ORDER -->
        <div th:each="order : ${orders}"
             th:attr="data-id=${order.orderID}"
             class="order-item bg-white rounded-2xl shadow p-5 mb-6 border border-slate-100 hover:shadow-lg transition">

            <!-- HEADER -->
            <div class="flex justify-between items-center mb-4">

                <div>
                    <p class="text-sm text-slate-400">
                        Order ID:
                        <span class="font-bold text-slate-700"
                              th:text="${order.orderID}"></span>
                    </p>

                    <span th:if="${order.status.name() == 'Pending'}"
                          class="px-3 py-1 text-xs bg-yellow-100 text-yellow-600 rounded-full font-semibold">
                        Pending
                    </span>

                    <span th:if="${order.status.name() == 'Paid'}"
                          class="px-3 py-1 text-xs bg-green-100 text-green-600 rounded-full font-semibold">
                        Paid
                    </span>

                    <span th:if="${order.status.name() == 'Cancelled'}"
                          class="px-3 py-1 text-xs bg-red-100 text-red-600 rounded-full font-semibold">
                        Cancelled
                    </span>
                </div>

                <div class="flex gap-2">

                    <a th:if="${order.status.name() == 'Pending'}"
                       th:href="@{/order/payment/{id}(id=${order.orderID})}"
                       class="flex items-center gap-1 px-3 py-2 bg-green-500 text-white rounded-lg text-sm hover:bg-green-600">
                        <span class="material-symbols-outlined text-[18px]">payments</span>
                        Payment
                    </a>

                    <a th:href="@{/order/detail/{id}(id=${order.orderID})}"
                       class="flex items-center gap-1 px-3 py-2 bg-slate-500 text-white rounded-lg text-sm hover:bg-slate-600">
                        <span class="material-symbols-outlined text-[18px]">visibility</span>
                        Chi tiết
                    </a>

                    <a th:if="${order.status.name() == 'Pending'}"
                       th:href="@{/order/edit/{id}(id=${order.orderID})}"
                       class="flex items-center gap-1 px-3 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600">
                        <span class="material-symbols-outlined text-[18px]">edit</span>
                        Sửa
                    </a>

                    <button th:if="${order.status.name() != 'Pending'}"
                            disabled
                            class="flex items-center gap-1 px-3 py-2 bg-gray-300 text-white rounded-lg text-sm cursor-not-allowed">
                        <span class="material-symbols-outlined text-[18px]">lock</span>
                        Locked
                    </button>

                    <a th:if="${order.status.name() == 'Pending'}"
                       th:href="@{/order/delete/{id}(id=${order.orderID})}"
                       onclick="return confirm('Bạn có chắc muốn xóa đơn?')"
                       class="flex items-center gap-1 px-3 py-2 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600">
                        <span class="material-symbols-outlined text-[18px]">delete</span>
                        Xóa
                    </a>

                </div>
            </div>

            <!-- INFO -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm mb-4">

                <div>
                    <p class="text-slate-400">Tổng tiền</p>
                    <p class="font-bold text-green-600"
                       th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    </p>
                </div>

                <div>
                    <p class="text-slate-400">Thanh toán</p>
                    <p class="font-semibold"
                       th:text="${order.paymentMethod}"></p>
                </div>

                <div>
                    <p class="text-slate-400">Ngày tạo</p>
                    <p th:text="${#temporals.format(order.createdDate, 'dd/MM/yyyy HH:mm')}"></p>
                </div>

                <div>
                    <p class="text-slate-400">Ngày trả</p>
                    <p th:text="${order.paidDate != null ? #temporals.format(order.paidDate, 'dd/MM/yyyy HH:mm') : '-'}"></p>
                </div>

            </div>

        </div>

    </div>

    <!-- PAGINATION -->
    <div id="pagination" class="flex justify-center mt-8 gap-2"></div>

</div>

<!-- SCRIPT -->
<script>
    const searchInput = document.getElementById("searchOrder");
    const orders = document.querySelectorAll(".order-item");
    const pagination = document.getElementById("pagination");

    const itemsPerPage = 10;
    let currentPage = 1;
    let filteredOrders = [...orders];

    function showPage(page) {
        currentPage = page;

        orders.forEach(order => order.style.display = "none");

        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;

        filteredOrders.slice(start, end).forEach(order => {
            order.style.display = "block";
        });

        renderPagination();
    }

    function renderPagination() {
        pagination.innerHTML = "";
        const totalPages = Math.ceil(filteredOrders.length / itemsPerPage);

        if (currentPage > 1) {
            const prev = document.createElement("button");
            prev.innerText = "Prev";
            prev.className = "px-3 py-1 bg-slate-300 rounded hover:bg-slate-400";
            prev.onclick = () => showPage(currentPage - 1);
            pagination.appendChild(prev);
        }

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement("button");
            btn.innerText = i;

            btn.className = "px-3 py-1 border rounded " +
                (i === currentPage ? "bg-blue-500 text-white" : "bg-white hover:bg-blue-100");

            btn.onclick = () => showPage(i);
            pagination.appendChild(btn);
        }

        if (currentPage < totalPages) {
            const next = document.createElement("button");
            next.innerText = "Next";
            next.className = "px-3 py-1 bg-slate-300 rounded hover:bg-slate-400";
            next.onclick = () => showPage(currentPage + 1);
            pagination.appendChild(next);
        }
    }

    searchInput.addEventListener("keyup", function () {
        const keyword = this.value.toLowerCase();

        filteredOrders = [...orders].filter(order => {
            const id = order.getAttribute("data-id").toLowerCase();
            return id.includes(keyword);
        });

        showPage(1);
    });

    showPage(1);
</script>

</body>
</html>

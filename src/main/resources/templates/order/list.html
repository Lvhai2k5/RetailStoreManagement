<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách đơn hàng</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body class="bg-slate-100 font-sans">

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- CONTENT -->
<div class="ml-0 lg:ml-64 mt-20 p-6">

    <h1 class="text-2xl font-bold mb-6 text-slate-700">
        📦 Danh sách đơn hàng
    </h1>

    <!-- LOOP ORDER -->
    <div th:each="order : ${orders}"
         class="bg-white rounded-2xl shadow p-5 mb-6 border border-slate-100 hover:shadow-lg transition">

        <!-- HEADER -->
        <div class="flex justify-between items-center mb-4">

            <div>
                <p class="text-sm text-slate-400">
                    Order ID:
                    <span class="font-bold text-slate-700"
                          th:text="${order.orderID}"></span>
                </p>

                <!-- STATUS -->
                <span th:if="${order.status.name() == 'Pending'}"
                      class="px-3 py-1 text-xs bg-yellow-100 text-yellow-600 rounded-full font-semibold">
                    Pending
                </span>

                <span th:if="${order.status.name() == 'Paid'}"
                      class="px-3 py-1 text-xs bg-green-100 text-green-600 rounded-full font-semibold">
                    Paid
                </span>

                <span th:if="${order.status.name() == 'Cancelled'}"
                      class="px-3 py-1 text-xs bg-red-100 text-red-600 rounded-full font-semibold">
                    Cancelled
                </span>
            </div>

            <!-- ACTION -->
            <div class="flex gap-2">

                <!-- VIEW DETAIL -->
                <a th:href="@{/order/detail/{id}(id=${order.orderID})}"
                   class="flex items-center gap-1 px-3 py-2 bg-slate-500 text-white rounded-lg text-sm hover:bg-slate-600">

                    <span class="material-symbols-outlined text-[18px]">visibility</span>
                    Chi tiết
                </a>

                <!-- EDIT ONLY PENDING -->
                <a th:if="${order.status.name() == 'Pending'}"
                   th:href="@{/order/edit/{id}(id=${order.orderID})}"
                   class="flex items-center gap-1 px-3 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600">

                    <span class="material-symbols-outlined text-[18px]">edit</span>
                    Sửa
                </a>

                <!-- LOCK -->
                <button th:if="${order.status.name() != 'Pending'}"
                        disabled
                        class="flex items-center gap-1 px-3 py-2 bg-gray-300 text-white rounded-lg text-sm cursor-not-allowed">

                    <span class="material-symbols-outlined text-[18px]">lock</span>
                    Locked
                </button>

                <!-- DELETE ONLY PENDING -->
                <a th:if="${order.status.name() == 'Pending'}"
                   th:href="@{/order/delete/{id}(id=${order.orderID})}"
                   onclick="return confirm('Bạn có chắc muốn xóa đơn?')"
                   class="flex items-center gap-1 px-3 py-2 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600">

                    <span class="material-symbols-outlined text-[18px]">delete</span>
                    Xóa
                </a>

            </div>
        </div>

        <!-- INFO -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm mb-4">

            <div>
                <p class="text-slate-400">Tổng tiền</p>
                <p class="font-bold text-green-600"
                   th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                </p>
            </div>

            <div>
                <p class="text-slate-400">Thanh toán</p>
                <p class="font-semibold"
                   th:text="${order.paymentMethod}"></p>
            </div>

            <div>
                <p class="text-slate-400">Ngày tạo</p>
                <p th:text="${#temporals.format(order.createdDate, 'dd/MM/yyyy HH:mm')}"></p>
            </div>

            <div>
                <p class="text-slate-400">Ngày trả</p>
                <p th:text="${order.paidDate != null ? #temporals.format(order.paidDate, 'dd/MM/yyyy HH:mm') : '-'}"></p>
            </div>

        </div>

        <!-- TABLE -->
        <div class="overflow-x-auto">
            <table class="w-full text-sm rounded-xl overflow-hidden shadow-sm">

                <thead class="bg-slate-200 text-slate-700 uppercase text-xs">
                <tr>
                    <th class="p-3 text-left">Sản phẩm</th>
                    <th class="p-3 text-center">Số lượng</th>
                    <th class="p-3 text-right">Đơn giá</th>
                    <th class="p-3 text-right">Thành tiền</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="d : ${order.orderDetails}"
                    class="border-t hover:bg-slate-50 transition">

                    <td class="p-3 font-medium text-slate-700">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-slate-400">inventory_2</span>
                            <span th:text="${d.product.name}"></span>
                        </div>
                    </td>

                    <td class="p-3 text-center font-semibold"
                        th:text="${d.quantity}"></td>

                    <td class="p-3 text-right text-slate-600"
                        th:text="${#numbers.formatDecimal(d.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    </td>

                    <td class="p-3 text-right font-bold text-green-600"
                        th:text="${#numbers.formatDecimal(d.unitPrice * d.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    </td>

                </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>

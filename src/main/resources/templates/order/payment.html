<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="ml-0 lg:ml-64 mt-16 p-6 min-h-screen">

    <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl">

        <h2 class="text-2xl font-bold mb-6 text-slate-700">
            Chọn phương thức thanh toán
        </h2>

        <form th:action="@{/order/pay}" method="post" class="space-y-6">

            <!-- OPTION -->
            <div class="space-y-4">

                <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="paymentMethod" value="Cash" checked>
                    <span>💵 Tiền mặt</span>
                </label>

                <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="paymentMethod" value="Transfer">
                    <span>🏦 Chuyển khoản</span>
                </label>

            </div>

            <!-- BUTTON -->
            <div class="flex justify-between mt-6">

                <!-- DASHBOARD -->
                <a href="/dashboard"
                   class="px-5 py-2 bg-gray-200 rounded-xl hover:bg-gray-300">
                    ← Dashboard
                </a>

                <!-- PAY -->
                <button type="submit"
                        class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl">
                    Thanh toán
                </button>

            </div>

        </form>

    </div>

</main>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

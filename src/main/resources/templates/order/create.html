<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Tạo đơn hàng</title>

	<!-- Tailwind -->
	<script src="https://cdn.tailwindcss.com"></script>

	<!-- Font -->
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">

	<!-- Icon -->
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

	<style>
		body {
			font-family: 'Manrope', sans-serif;
		}
	</style>
</head>

<body class="bg-slate-100">

	<!-- HEADER -->
	<div th:replace="~{fragments/header :: header}"></div>

	<!-- SIDEBAR -->
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<!-- CONTENT -->
	<main class="ml-0 lg:ml-64 mt-16 p-6 min-h-screen">

		<!-- TITLE -->
		<div class="flex items-center gap-3 mb-6">
			<span class="material-symbols-outlined text-rose-500 text-4xl">shopping_cart</span>
			<div>
				<h1 class="text-2xl font-bold text-slate-700">Tạo đơn hàng</h1>
				<p class="text-sm text-gray-400">Thêm sản phẩm vào giỏ và tạo đơn</p>
			</div>
		</div>

		<!-- CARD -->
		<div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-xl">

			<form th:action="@{/order/save}" method="post" th:object="${orderDTO}" class="space-y-6">

				<!-- SEARCH AUTOCOMPLETE -->
				<div class="relative">
					<label class="text-sm text-gray-500">Tìm sản phẩm</label>

					<input type="text" id="searchProduct" placeholder="Nhập tên sản phẩm..."
						class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-rose-300">

					<!-- DROPDOWN -->
					<div id="suggestBox"
						class="absolute w-full bg-white border rounded-xl mt-1 shadow-lg hidden max-h-60 overflow-y-auto z-50">
					</div>
				</div>

				<!-- QUANTITY + ADD -->
				<div class="flex gap-3">
					<input type="number" id="qty" placeholder="Số lượng" min="1" class="w-full border p-3 rounded-xl">

					<button type="button" onclick="addToCart()"
						class="bg-blue-500 hover:bg-blue-600 text-white px-6 rounded-xl flex items-center gap-2">
						<span class="material-symbols-outlined">add</span>
						Thêm
					</button>
				</div>

				<!-- CART -->
				<div class="mt-6">

					<h3 class="font-bold text-lg mb-3 text-slate-700">
						Danh sách sản phẩm
					</h3>

					<div class="overflow-x-auto">
						<table class="w-full text-sm border rounded-xl overflow-hidden">
							<thead class="bg-gray-100">
								<tr>
									<th class="p-3 text-left">Tên</th>
									<th class="p-3 text-center">Số lượng</th>
									<th class="p-3 text-center">Xóa</th>
								</tr>
							</thead>

							<tbody id="cartBody"></tbody>

						</table>
					</div>

				</div>
				
				
				<div class="text-right mt-4">
				    <span class="text-lg font-bold text-rose-500">
				        Tổng: <span id="totalPrice">0 đ</span>
				    </span>
				</div>

				<input type="hidden" th:field="*{totalAmount}" id="totalInput">
				

				<!-- PAYMENT -->
				<div>
					<label class="text-sm text-gray-500">Phương thức thanh toán</label>
					<select th:field="*{paymentMethod}" class="w-full border p-3 rounded-xl">
						<option value="Cash">Tiền mặt</option>
						<option value="Transfer">Chuyển khoản</option>
					</select>
				</div>

				<!-- BUTTON -->
				<div class="flex justify-between mt-6">

					<a href="/dashboard"
						class="px-5 py-2 bg-gray-200 rounded-xl hover:bg-gray-300 flex items-center gap-2">
						<span class="material-symbols-outlined">arrow_back</span>
						Quay lại
					</a>

					<button type="submit"
						class="bg-rose-500 hover:bg-rose-600 text-white px-6 py-2 rounded-xl shadow flex items-center gap-2">
						<span class="material-symbols-outlined">save</span>
						Tạo đơn
					</button>

				</div>

			</form>

		</div>

	</main>

	<!-- FOOTER -->
	<div th:replace="~{fragments/footer :: footer}"></div>

	<!-- ================= JS ================= -->

	<!-- ================= JS ================= -->

	<script th:inline="javascript">
	    let products = [
	        /*[# th:each="p : ${products}"]*/
	        {
	            id: /*[[${p.productID}]]*/ 0,
	            name: /*[[${p.name}]]*/ "",
	            price: /*[[${p.price}]]*/ 0
	        },
	        /*[/]*/
	    ];
	</script>
	<script>

		let cart = [];
		let selectedProduct = null;

		// SEARCH AUTOCOMPLETE
		document.getElementById("searchProduct").addEventListener("keyup", function () {

			let keyword = this.value.toLowerCase();
			let box = document.getElementById("suggestBox");

			box.innerHTML = "";

			if (keyword.length === 0) {
				box.classList.add("hidden");
				return;
			}

			let filtered = products.filter(p =>
			    p.name &&
			    removeVietnamese(p.name.toLowerCase()).includes(removeVietnamese(keyword))
			);

			if (filtered.length === 0) {
				box.innerHTML = `<div class="p-2 text-gray-400">Không tìm thấy</div>`;
			} else {
				filtered.forEach(p => {
					box.innerHTML += `
	                    <div onclick="selectProduct('${p.id}','${p.name}')"
	                         class="p-3 hover:bg-rose-100 cursor-pointer border-b">
	                        ${p.name}
	                    </div>
	                `;
				});
			}

			box.classList.remove("hidden");
		});

		// CLICK NGOÀI → ẨN
		document.addEventListener("click", function (e) {
			if (!e.target.closest("#searchProduct") && !e.target.closest("#suggestBox")) {
				document.getElementById("suggestBox").classList.add("hidden");
			}
		});

		// CHỌN PRODUCT
		function selectProduct(id, name) {
			document.getElementById("searchProduct").value = name;
			document.getElementById("suggestBox").classList.add("hidden");

			selectedProduct = {
				productID: id,
				productName: name
			};
		}

		// ADD TO CART
		function addToCart() {

			let qty = parseInt(document.getElementById("qty").value);

			if (!selectedProduct || !qty || qty <= 0) {
				alert("Vui lòng chọn sản phẩm và nhập số lượng");
				return;
			}

			// nếu sản phẩm đã có → cộng dồn
			let exist = cart.find(i => i.productID === selectedProduct.productID);

			if (exist) {
				exist.quantity += qty;
			} else {
				cart.push({
				    productID: selectedProduct.productID,
				    productName: selectedProduct.productName,
				    quantity: qty,
				    price: products.find(p => p.id == selectedProduct.productID).price
				});
			}

			renderCart();

			// reset
			document.getElementById("searchProduct").value = "";
			document.getElementById("qty").value = "";
			selectedProduct = null;
		}

		// RENDER CART
		function renderCart() {
		    let body = document.getElementById("cartBody");
		    body.innerHTML = "";

		    let total = 0; // ✅ thêm dòng này

		    cart.forEach((item, index) => {

		        let sum = item.price * item.quantity; // ✅ tính từng dòng
		        total += sum;

		        body.innerHTML += `
		            <tr class="border-t">
		                <td class="p-3">${item.productName}</td>
		                <td class="p-3 text-center">${item.quantity}</td>
		                <td class="p-3 text-center">${sum.toLocaleString()} đ</td>
		                <td class="p-3 text-center">
		                    <button type="button"
		                        onclick="removeItem(${index})"
		                        class="text-red-500 hover:text-red-700">
		                        ❌
		                    </button>
		                </td>
		            </tr>

		            <input type="hidden" name="items[${index}].productID" value="${item.productID}">
		            <input type="hidden" name="items[${index}].quantity" value="${item.quantity}">
		        `;
		    });

		    // ✅ cập nhật tổng tiền lên UI
		    document.getElementById("totalPrice").innerText =
		        total.toLocaleString() + " đ";

		    // ✅ gán vào input hidden để gửi về server
		    document.getElementById("totalInput").value = total;
		}
		// REMOVE
		function removeItem(index) {
			cart.splice(index, 1);
			renderCart();
		}
		function removeVietnamese(str) {
		    return str
		        .normalize("NFD")
		        .replace(/[\u0300-\u036f]/g, "")
		        .replace(/đ/g, "d")
		        .replace(/Đ/g, "D");
		}

	</script>
</body>

</html>

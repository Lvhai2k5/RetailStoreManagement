<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- SIDEBAR -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="ml-0 lg:ml-64 mt-16 p-6 min-h-screen">

    <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl">

        <!-- TITLE -->
        <h2 class="text-2xl font-bold mb-2 text-slate-700">
            Thanh toán đơn #<span th:text="${order.orderID}"></span>
        </h2>

        <p class="mb-6 text-green-600 font-bold text-lg">
            Tổng tiền:
            <span th:text="${order.totalAmount}"></span> ₫
        </p>

        <!-- FORM -->
        <form th:action="@{/order/paydirect}" method="post" class="space-y-6">

            <!-- ORDER ID -->
            <input type="hidden" name="orderId"
                   th:value="${order.orderID}" />

            <!-- OPTION -->
            <div class="space-y-4">

                <!-- CASH -->
                <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="radio" id="cash" name="paymentMethod" value="Cash" checked>
                    <span>💵 Tiền mặt</span>
                </label>

                <!-- TRANSFER -->
                <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-gray-50">
                    <input type="radio" id="transfer" name="paymentMethod" value="Transfer">
                    <span>🏦 Chuyển khoản</span>
                </label>

            </div>

            <!-- QR CODE -->
            <div id="qrSection" class="hidden text-center mt-6">
                <p class="mb-3 font-semibold text-slate-600">
                    Quét QR để thanh toán
                </p>

                <img th:src="@{/images/qr.jpg}"
                     alt="QR Code"
                     class="w-52 mx-auto rounded-xl shadow">
            </div>

            <!-- BUTTON -->
            <div class="flex justify-between mt-6">

                <a th:href="@{/order/listorder}"
                   class="px-5 py-2 bg-gray-200 rounded-xl hover:bg-gray-300">
                    ← Quay lại
                </a>

                <button type="submit"
                        class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl">
                    Thanh toán
                </button>

            </div>

        </form>

    </div>

</main>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- SCRIPT -->
<script>
    const cash = document.getElementById("cash");
    const transfer = document.getElementById("transfer");
    const qrSection = document.getElementById("qrSection");

    function toggleQR() {
        if (transfer.checked) {
            qrSection.classList.remove("hidden");
        } else {
            qrSection.classList.add("hidden");
        }
    }

    cash.addEventListener("change", toggleQR);
    transfer.addEventListener("change", toggleQR);

    toggleQR();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Retail App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    /* 🌈 Splash */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffff, #ffcc00);
      background-size: 800% 800%;
      animation: gradientMove 10s ease infinite;

      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      z-index: 10;
      transition: 0.8s;
    }

    .logo {
      font-size: 45px;
      font-weight: 700;
      text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff;
      animation: glow 2s infinite alternate;
    }

    .subtitle {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.9;
      animation: floatText 3s ease-in-out infinite;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid transparent;
      border-top: 5px solid #fff;
      border-right: 5px solid #00ffff;
      border-radius: 50%;
      margin-top: 30px;
      animation: spin 1s linear infinite, glowSpin 2s infinite alternate;
    }

    /* 🚀 OVERLAY CHỐNG MÀN HÌNH ĐEN */
    #transitionOverlay {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: linear-gradient(270deg, #ff00cc, #00ffff, #3333ff);
      background-size: 600% 600%;
      animation: gradientMove 3s ease infinite;

      opacity: 0;
      z-index: 999;
      pointer-events: none;
      transition: 0.6s;
    }

    .activeOverlay {
      opacity: 1;
      transform: scale(1.2);
      filter: blur(10px);
    }

    /* ✨ Animations */
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff; }
    }

    @keyframes glowSpin {
      from { box-shadow: 0 0 10px #fff; }
      to { box-shadow: 0 0 25px #00ffff; }
    }

    @keyframes floatText {
      50% { transform: translateY(-10px); }
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>

<body>

  <!-- Splash -->
  <div id="splash">
    <div class="logo">🛍️ Retail Store</div>
    <div class="subtitle">Chào mừng đến cửa hàng của bạn</div>

    <lottie-player 
      src="https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json"  
      background="transparent"  
      speed="1"  
      style="width: 200px; height: 200px;"  
      loop  
      autoplay>
    </lottie-player>

    <div class="spinner"></div>
  </div>

  <!-- Overlay -->
  <div id="transitionOverlay"></div>

  <script>
    setTimeout(() => {
      const splash = document.getElementById("splash");
      const overlay = document.getElementById("transitionOverlay");

      // splash zoom + fade
      splash.style.opacity = "0";
      splash.style.transform = "scale(1.1)";
      splash.style.filter = "blur(5px)";

      // bật overlay che màn hình
      setTimeout(() => {
        overlay.classList.add("activeOverlay");
      }, 300);

      // redirect mượt (không thấy màn hình đen)
      setTimeout(() => {
        window.location.href = "/dashboard";
      }, 900);

    }, 3000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-100">

<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="ml-0 lg:ml-64 mt-16 p-6">

    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-8">

        <!-- Title -->
        <div class="flex items-center gap-2 mb-6">
            <span class="material-symbols-outlined text-rose-500 text-3xl">
                inventory_2
            </span>
            <h2 class="text-2xl font-bold text-gray-700">
                Chi tiết sản phẩm
            </h2>
        </div>

        <!-- Info Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- ID -->
            <div class="bg-slate-50 p-4 rounded-xl">
                <p class="text-sm text-gray-500">Mã sản phẩm</p>
                <p class="font-semibold text-lg" th:text="${product.productID}"></p>
            </div>

            <!-- Name -->
            <div class="bg-slate-50 p-4 rounded-xl">
                <p class="text-sm text-gray-500">Tên sản phẩm</p>
                <p class="font-semibold text-lg" th:text="${product.name}"></p>
            </div>

            <!-- Price -->
            <div class="bg-slate-50 p-4 rounded-xl">
                <p class="text-sm text-gray-500">Giá bán</p>
                <p class="font-bold text-lg text-rose-500"
                   th:text="${#numbers.formatDecimal(product.defaultSellingPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                </p>
            </div>

            

            <!-- Product Type -->
            <div class="bg-slate-50 p-4 rounded-xl md:col-span-2">
                <p class="text-sm text-gray-500">Loại sản phẩm</p>

                <span class="inline-block mt-1 px-3 py-1 text-sm rounded-full bg-rose-100 text-rose-500 font-medium"
                      th:text="${product.productType != null ? product.productType.name : 'Chưa phân loại'}">
                </span>

                <p class="text-xs text-gray-400 mt-2"
                   th:if="${product.productType != null}">
                    Markup:
                    <span th:text="${product.productType.markupPercent} + '%'"></span>
                </p>
            </div>

        </div>

        <!-- Button -->
        <div class="mt-8 flex justify-between items-center">

            <a href="/listproduct"
               class="flex items-center gap-2 bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg transition">

                <span class="material-symbols-outlined">arrow_back</span>
                Quay lại
            </a>

            <span class="text-sm text-gray-400 italic">
                Read-only mode
            </span>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

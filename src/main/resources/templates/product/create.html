<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Thêm sản phẩm</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>

<body class="bg-slate-100">

<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="ml-0 lg:ml-64 mt-16 p-6">

    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl p-8">

        <div class="flex items-center gap-3 mb-8">
            <span class="material-symbols-outlined text-green-500 text-4xl">
                add_box
            </span>
            <div>
                <h2 class="text-2xl font-bold text-gray-700">
                    Thêm sản phẩm mới
                </h2>
                <p class="text-sm text-gray-400">
                    Nhập đầy đủ thông tin sản phẩm
                </p>
            </div>
        </div>

        <form th:action="@{/product/save}" method="post"
              th:object="${product}"
              class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div class="col-span-2">
                <label class="text-sm text-gray-500">Mã sản phẩm</label>
                <input type="text"
                       th:field="*{productID}"
                       placeholder="VD: SP001"
                       class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-green-300 outline-none">
            </div>

            <div class="col-span-2">
                <label class="text-sm text-gray-500">Tên sản phẩm</label>
                <input type="text"
                       th:field="*{name}"
                       placeholder="Nhập tên sản phẩm"
                       class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-green-300 outline-none">
            </div>

            <div class="col-span-2">
                <label class="text-sm text-gray-500">Trạng thái</label>
                <select th:field="*{status}"
                        class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-green-300 outline-none">
                    <option value="BUYING">Đang bán</option>
                    <option value="HIDING">Ẩn</option>
                </select>
            </div>

            <div class="col-span-2">
                <label class="text-sm text-gray-500">Loại sản phẩm</label>

                <select th:field="*{productType.productTypeID}"
                        class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-green-300 outline-none">

                    <option value="">-- Chọn loại --</option>

                    <option th:each="type : ${productTypes}"
                            th:value="${type.productTypeID}"
                            th:text="${type.name}">
                    </option>

                </select>
            </div>

            <div class="col-span-2 flex justify-between mt-4">

                <a href="/listproduct"
                   class="px-5 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 transition-all">
                    ← Quay lại
                </a>

                <button type="submit"
                        class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl shadow-md transition-all">
                    + Thêm sản phẩm
                </button>

            </div>

        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

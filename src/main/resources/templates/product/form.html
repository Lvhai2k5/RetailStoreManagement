<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>

<body class="bg-slate-100">

<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="ml-0 lg:ml-64 mt-16 p-6">

    <!-- CARD -->
    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl p-8">

        <!-- TITLE -->
        <div class="flex items-center gap-3 mb-8">
            <span class="material-symbols-outlined text-rose-500 text-4xl">
                edit
            </span>
            <div>
                <h2 class="text-2xl font-bold text-gray-700">
                    Chỉnh sửa sản phẩm
                </h2>
                <p class="text-sm text-gray-400">
                    Cập nhật thông tin sản phẩm trong hệ thống
                </p>
            </div>
        </div>

        <!-- FORM -->
        <form th:action="@{/product/save}" method="post"
              th:object="${product}"
              class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- ID -->
            <div class="col-span-2">
                <label class="text-sm text-gray-500 flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">tag</span>
                    Mã sản phẩm
                </label>
                <input type="text"
                       th:field="*{productID}"
                       readonly
                       class="w-full border p-3 rounded-xl bg-gray-100 cursor-not-allowed">
            </div>

            <!-- NAME -->
            <div class="col-span-2">
                <label class="text-sm text-gray-500 flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">inventory_2</span>
                    Tên sản phẩm
                </label>
                <input type="text"
                       th:field="*{name}"
                       placeholder="Nhập tên sản phẩm"
                       class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-rose-300 outline-none">
            </div>

            <!-- PRICE -->
            <div>
                <label class="text-sm text-gray-500 flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">payments</span>
                    Giá bán
                </label>
                <input type="number"
                       step="0.01"
                       th:field="*{defaultSellingPrice}"
                       placeholder="0.00"
                       class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-rose-300 outline-none">
            </div>

            <!-- STATUS -->
            <div>
                <label class="text-sm text-gray-500 flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">toggle_on</span>
                    Trạng thái
                </label>
				<select th:field="*{status}"
				        class="w-full border p-3 rounded-xl">

				    <option value="BUYING">Đang bán</option>
				    <option value="HIDING">Ẩn</option>

				</select>
            </div>

            <!-- PRODUCT TYPE -->
            <div class="col-span-2">
                <label class="text-sm text-gray-500 flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">category</span>
                    Loại sản phẩm
                </label>

                <select th:field="*{productType.productTypeID}"
                        class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-rose-300 outline-none">

                    <option value="">-- Chọn loại sản phẩm --</option>

                    <option th:each="type : ${productTypes}"
                            th:value="${type.productTypeID}"
                            th:text="${type.name}">
                    </option>

                </select>
            </div>

            <!-- CREATED DATE -->
            <div class="col-span-2">
                <label class="text-sm text-gray-500 flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">calendar_today</span>
                    Ngày tạo
                </label>
                <input type="text"
                       th:value="${#temporals.format(product.createdDate, 'dd/MM/yyyy HH:mm')}"
                       readonly
                       class="w-full border p-3 rounded-xl bg-gray-100">
            </div>

            <!-- BUTTON -->
            <div class="col-span-2 flex justify-between mt-4">

                <a href="/listproduct"
                   class="flex items-center gap-2 px-5 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 transition">
                    <span class="material-symbols-outlined">arrow_back</span>
                    Quay lại
                </a>

                <button type="submit"
                        class="flex items-center gap-2 bg-rose-500 hover:bg-rose-600 text-white px-6 py-2 rounded-xl shadow-md transition">
                    <span class="material-symbols-outlined">save</span>
                    Lưu sản phẩm
                </button>

            </div>

        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

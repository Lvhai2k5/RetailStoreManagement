<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Retail App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    /* Splash Screen */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      z-index: 10;
      animation: fadeIn 1s ease;
    }

    .logo {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 10px;
      animation: zoomIn 1s ease;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 30px;
      animation: slideUp 1s ease;
    }

    /* Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* Dashboard */
    #dashboard {
      display: none;
      height: 100vh;
      background: #f5f7fa;
      padding: 20px;
    }

    .header {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      font-size: 14px;
      color: #888;
    }

    .card p {
      font-size: 22px;
      font-weight: 600;
      margin-top: 5px;
    }

    /* Animations */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>

<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="logo">🛍️ Retail Store</div>
    <div class="subtitle">Chào mừng đến cửa hàng của bạn</div>
    <div class="spinner"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="header">📊 Dashboard</div>

    <div class="cards">
      <div class="card">
        <h3>Doanh thu hôm nay</h3>
        <p>$1,250</p>
      </div>

      <div class="card">
        <h3>Đơn hàng</h3>
        <p>32</p>
      </div>

      <div class="card">
        <h3>Sản phẩm</h3>
        <p>120</p>
      </div>

      <div class="card">
        <h3>Khách hàng</h3>
        <p>89</p>
      </div>
    </div>
  </div>

  <script>
    // Auto chuyển sau 3 giây
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    }, 3000);
  </script>

</body>
</html>

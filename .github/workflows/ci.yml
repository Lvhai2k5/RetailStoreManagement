name: Spring Boot CI

on:
  pull_request:
    branches: [ examiner, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ❌ Skip toàn bộ test
    - name: Build project (skip all tests)
      run: mvn clean install -Dmaven.test.skip=true

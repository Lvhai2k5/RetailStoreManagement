name: Java CI with Maven

on:
  push:
    branches: [ "main", "examiner" ]
  pull_request:
    branches: [ "main", "examiner" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build project
      run: mvn -B clean install -DskipTests
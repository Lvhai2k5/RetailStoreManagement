name: Spring Boot CI

on:
  pull_request:
    branches: [ examiner, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code
    - uses: actions/checkout@v4

    # 2. Cài Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Check pom.xml
    - name: Check pom.xml
      run: |
        test -f pom.xml
        echo "pom.xml exists"

    # 4. Build (BỎ TEST)
    - name: Build project
      run: mvn clean install -DskipTests

    # 5. Success
    - name: CI success
      run: echo "Build successful"

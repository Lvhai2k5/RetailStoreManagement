name: Spring Boot CI

on:
  pull_request:
    branches: [ examiner, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code
    - uses: actions/checkout@v4

    # 2. Cài Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Check Maven tồn tại
    - name: Check pom.xml
      run: |
        test -f pom.xml
        echo "pom.xml exists"

    # 4. Build project
    - name: Build project
      run: mvn clean compile

    # 5. Run test
    - name: Run test
      run: mvn test

    # 6. Success
    - name: CI success
      run: echo "Build successful"
